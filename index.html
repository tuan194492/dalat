<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nha Trang Trip Countdown</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:white;

/* fallback background image */

background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1583417319070-4a69db38a482?auto=format&fit=crop&w=1920&q=80");

background-size:cover;
background-position:center;
}

/* video background */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* container */

.container{

text-align:center;
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 40px rgba(0,0,0,0.6);

}

h1{
font-size:2.5em;
margin-bottom:30px;
}

/* countdown */

.countdown{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.block{

width:120px;
height:120px;

background:linear-gradient(135deg,#ff5f6d,#ffc371);

border-radius:15px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

font-size:2.5em;
font-weight:bold;

box-shadow:0 5px 20px rgba(0,0,0,0.4);

}

.label{
font-size:0.5em;
margin-top:5px;
}

/* plane */

.plane{

position:fixed;
top:20%;
left:-200px;
font-size:40px;

animation:fly 15s linear infinite;

}

@keyframes fly{

0%{left:-200px;}
100%{left:120%;}

}

/* fireworks */

canvas{

position:fixed;
top:0;
left:0;
pointer-events:none;

}

@media(max-width:600px){

.block{
width:80px;
height:80px;
font-size:1.7em;
}

h1{
font-size:1.8em;
}

}

</style>

</head>

<body>

<video autoplay muted loop playsinline>

<source src="https://cdn.coverr.co/videos/coverr-beach-waves-1572/1080p.mp4" type="video/mp4">

</video>

<div class="overlay"></div>

<div class="plane">✈️</div>

<div class="container">

<h1>Countdown to Nha Trang Trip 🌴</h1>

<div class="countdown">

<div class="block">
<span id="days">0</span>
<div class="label">Days</div>
</div>

<div class="block">
<span id="hours">0</span>
<div class="label">Hours</div>
</div>

<div class="block">
<span id="minutes">0</span>
<div class="label">Minutes</div>
</div>

<div class="block">
<span id="seconds">0</span>
<div class="label">Seconds</div>
</div>

</div>

</div>

<canvas id="fireworks"></canvas>

<script>

const targetDate = new Date("2026-04-09T00:00:00+07:00").getTime();

function countdown(){

const now = new Date().getTime();
const diff = targetDate - now;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
const seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerText=days;
document.getElementById("hours").innerText=hours;
document.getElementById("minutes").innerText=minutes;
document.getElementById("seconds").innerText=seconds;

if(diff<0){

clearInterval(timer);

document.querySelector(".container").innerHTML =
"<h1>Enjoy your Nha Trang Trip 🌴✈️</h1>";

startFireworks();

}

}

const timer=setInterval(countdown,1000);
countdown();

/* fireworks */

function startFireworks(){

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function createFirework(){

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<80;i++){

particles.push({

x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:100

});

}

}

function update(){

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";

ctx.fillRect(p.x,p.y,3,3);

if(p.life<=0)particles.splice(i,1);

});

requestAnimationFrame(update);

}

setInterval(createFirework,800);

update();

}

</script>

</body>

</html>
